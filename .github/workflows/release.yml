name: "Release App"

on:
  push:
    tags:
      - 'v*' # 只有当你打上类似 v0.1.0 这样的 tag 时才会触发自动打包

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            os_name: "windows"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin" # M1/M2/M3
            os_name: "macos-arm64"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin" # Intel Mac
            os_name: "macos-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      # 核心步骤：使用 tauri-action 进行打包
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Excel 脏数据清洗工具 ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: "--target ${{ matrix.target }}"

      # 将绿色免安装文件打包为 zip
      - name: Zip portable binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release
          Compress-Archive -Path "cleaning_app.exe" -DestinationPath "cleaning_app_${{ matrix.os_name }}_portable.zip"

      - name: Zip portable app (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r "cleaning_app_${{ matrix.os_name }}_portable.zip" "Excel 脏数据清洗工具.app"

      # 上传绿色免安装版 zip 到 Github Releases
      - name: Upload portable zip to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/cleaning_app_${{ matrix.os_name }}_portable.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/cleaning_app_${{ matrix.os_name }}_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
